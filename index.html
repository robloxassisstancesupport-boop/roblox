<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Revert Account</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f2f2f2;
}

.navbar{
height:50px;
background:white;
border-bottom:1px solid #ddd;
display:flex;
align-items:center;
padding:0 20px;
gap:35px;
}

.logo{
font-size:24px;
font-weight:bold;
transform:rotate(-10deg);
}

.navitem{
color:#333;
}

.search{
margin-left:auto;
width:300px;
padding:8px;
border:1px solid #ccc;
border-radius:5px;
}

.container{
width:420px;
margin:50px auto;
background:#ececec;
padding:20px;
}

.title{
text-align:center;
font-size:50px;
font-weight:bold;
margin-bottom:20px;
}

.info{
font-size:18px;
margin-bottom:20px;
line-height:1.5;
}

input{
width:100%;
padding:14px;
margin-top:15px;
font-size:18px;
border:1px solid #bbb;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
font-size:20px;
border:1px solid #aaa;
background:#e5e5e5;
border-radius:6px;
cursor:pointer;
}

.profile{
display:none;
text-align:center;
margin-top:25px;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
}

.warning{
border:1px solid black;
background:white;
padding:10px;
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">◼</div>
<div class="navitem">Charts</div>
<div class="navitem">Marketplace</div>
<div class="navitem">Create</div>
<div class="navitem">Robux</div>

<input class="search" placeholder="Search">
</div>

<div class="container">

<div class="title">
Revert Account
</div>

<div class="info">
You are about to revert your account to a past state.
Enter a Roblox username below.
</div>

<div class="warning">
⚠ Enter a username
</div>

<input
id="username"
placeholder="Username">

<button onclick="loadProfile()">
Submit
</button>

<div id="profile" class="profile">

<img id="avatar">

<h3 id="display"></h3>

<div id="user"></div>

</div>

</div>

<script>

async function loadProfile(){

let username=
document.getElementById("username").value;

try{

const response=await fetch(
"https://corsproxy.io/?https://users.roblox.com/v1/usernames/users",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
usernames:[username]
})
});

const data=await response.json();

if(!data.data.length){
alert("User not found");
return;
}

let id=data.data[0].id;

document.getElementById("avatar").src=
`https://www.roblox.com/headshot-thumbnail/image?userId=${id}&width=150&height=150&format=png`;

document.getElementById("display").innerText=
data.data[0].displayName;

document.getElementById("user").innerText=
"@" + username;

document.getElementById("profile").style.display=
"block";

}catch{

alert("Could not load profile");

}

}

</script>

</body>
</html>
